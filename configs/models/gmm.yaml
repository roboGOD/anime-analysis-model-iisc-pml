model:
  name: gmm
  family: probabilistic
selection:
  enabled: true
  candidate_k:
    - 4
    - 6
    - 8
    - 10
    - 12
  covariance_types:
    - diag
    - full
  scoring:
    primary: bic
    secondary: aic
training:
  max_iter: 300
  tol: 0.001
  reg_covar: 0.000001
  n_init: 5
  init_params: kmeans
